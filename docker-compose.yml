version: '3.8'

services:
  aztih-dashboard:
    build: .
    container_name: aztih-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TARGET_SERVER_HOST=${TARGET_SERVER_HOST}
      - TARGET_SERVER_USER=${TARGET_SERVER_USER}
      - TARGET_SERVER_SSH_KEY=${TARGET_SERVER_SSH_KEY}
      - TARGET_SERVER_PORT=${TARGET_SERVER_PORT}
      - TARGET_SERVER_NAME=${TARGET_SERVER_NAME}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - ${TARGET_SERVER_SSH_KEY}:${TARGET_SERVER_SSH_KEY}:ro
    restart: unless-stopped
    networks:
      - aztih-network

networks:
  aztih-network:
    driver: bridge
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    # Important: Limit resources for sandboxed execution
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: aztih-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - aztih-network
    depends_on:
      - n8n
      - openclaw
    restart: unless-stopped
    profiles:
      - prod

networks:
  aztih-network:
    driver: bridge

volumes:
  n8n-data:
    driver: local
  openclaw-cache:
    driver: local
