name: Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Verify script syntax
        run: bash -n scripts/zero_trust_harden.sh
      
      - name: Verify server.js syntax
        run: node -c server.js
      
      - name: Check package.json
        run: node -e "require('./package.json')"
