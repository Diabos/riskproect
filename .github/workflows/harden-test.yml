name: Zero-Trust Hardening Verification (CI/CD)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  test-hardening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Make Script Executable
        run: chmod +x scripts/zero_trust_harden.sh

      - name: Execute Zero-Trust Hardening Script
        run: sudo bash scripts/zero_trust_harden.sh

      - name: Verify UFW (Firewall) Status
        run: sudo ufw status verbose
        
      - name: Verify Fail2Ban Status
        run: sudo systemctl status fail2ban --no-pager

      - name: Verify SSH Hardening
        run: |
          echo "Checking if Root Login is Disabled..."
          grep "^PermitRootLogin no" /etc/ssh/sshd_config
          echo "Checking if Password Auth is Disabled..."
          grep "^PasswordAuthentication no" /etc/ssh/sshd_config
